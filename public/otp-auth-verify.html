<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Auth Demo - Enter OTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #F7C948 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .otp-container {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 420px; width: 100%;
        }
        h1 { text-align: center; margin-bottom: 10px; color: #333; }
        .subtitle { text-align: center; color: #777; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"] {
            width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 5px;
            font-size: 24px; text-align: center; letter-spacing: 8px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #FF6B35; outline: none; }
        .btn {
            width: 100%; background: #FF6B35; color: white; border: none;
            padding: 12px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        .btn:hover { background: #e55a2b; }
        .error { color: #f44336; margin-bottom: 15px; padding: 10px; background: #ffebee; border-radius: 5px; }
        .otp-hint {
            background: #e8f5e9; padding: 14px 18px; border-radius: 8px; margin-bottom: 20px;
            border-left: 4px solid #4CAF50; font-size: 14px; color: #333;
        }
        .otp-hint code { background: #c8e6c9; padding: 2px 8px; border-radius: 4px; font-size: 18px; font-weight: bold; }
        .timer { text-align: center; color: #999; font-size: 13px; margin-top: 15px; }
        .timer span { font-weight: bold; color: #FF6B35; }
    </style>
</head>
<body>
    <div class="otp-container">
        <h1>🔑 Enter OTP</h1>
        <p class="subtitle">A one-time password has been sent to your device</p>

        <div class="otp-hint">
            For this demo, use OTP: <code>123456</code>
        </div>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                document.write('<div class="error">' + decodeURIComponent(error) + '</div>');
            }
        </script>

        <form method="POST" action="/otp-auth/verify">
            <div class="form-group">
                <label for="otp-input">One-Time Password:</label>
                <input type="text" id="otp-input" name="otp" maxlength="6" required
                       placeholder="------" autocomplete="one-time-code">
            </div>

            <button type="submit" id="otp-submit" class="btn">Verify OTP</button>
        </form>

        <div class="timer">OTP expires in <span id="countdown">5:00</span></div>
    </div>

    <script>
        document.getElementById('otp-input').focus();

        let timeLeft = 300;
        const countdown = document.getElementById('countdown');
        const timer = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            countdown.textContent = min + ':' + sec.toString().padStart(2, '0');
            if (timeLeft <= 0) {
                clearInterval(timer);
                countdown.textContent = 'Expired';
                countdown.style.color = '#f44336';
            }
        }, 1000);
    </script>
</body>
</html>
